<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo - Gestão Integrada</title>
<meta name="theme-color" content="#0F1923">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root {
    --bg-main: #0F1923;
    --bg-card: #17222D;
    --bg-input: #233240;
    --accent: #FF4655;
    --text-main: #FFFFFF;
    --text-muted: #8F9EAC;
    --success: #11B27B;
    --border: #2B3A4A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  body {
    background-color: var(--bg-main);
    color: var(--text-main);
    padding-bottom: 75px; /* Espaço para a barra de navegação inferior */
    overflow-x: hidden;
  }

  /* Cabeçalho Fixo */
  header {
    background: var(--bg-card);
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header h1 { font-size: 20px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); }
  header h1 span { color: var(--accent); }

  /* Container Principal */
  .container { padding: 20px; max-width: 600px; margin: 0 auto; }

  /* Configuração das Telas */
  .view-section { display: none; }
  .view-section.active { display: block; animation: fadeIn 0.25s ease-in-out; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Barra de Navegação Inferior (Estilo Mobile Pro) */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 65px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 999;
  }

  .nav-item {
    background: none;
    border: none;
    color: var(--text-muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.2s;
    width: 25%;
  }

  .nav-item .icon { font-size: 20px; margin-bottom: 4px; }
  .nav-item.active { color: var(--accent); }

  /* Widgets de Resumo Rápido */
  .grid-resumo { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .widget-card { background: var(--bg-card); padding: 15px; border-radius: 10px; border-left: 4px solid var(--border); }
  .widget-card.receitas { border-left-color: var(--success); }
  .widget-card.despesas { border-left-color: var(--accent); }
  .widget-label { font-size: 12px; color: var(--text-muted); font-weight: bold; text-transform: uppercase; }
  .widget-val { font-size: 18px; font-weight: 800; margin-top: 5px; }

  /* Pílulas de Filtros Inline (Substitui submenus excessivos) */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
  .filter-pill {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
  }
  .filter-pill.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Elementos de Formulários Modernos */
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; }
  .form-control {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: white;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  .form-control:focus { border-color: var(--accent); }

  /* Cards de Listagem Estilizados */
  .data-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-info h4 { font-size: 14px; margin-bottom: 4px; }
  .card-info p { font-size: 12px; color: var(--text-muted); }
  .card-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .card-badge.rec { background: rgba(17, 178, 123, 0.15); color: var(--success); }
  .card-badge.des { background: rgba(255, 70, 85, 0.15); color: var(--accent); }

  /* Botões e Utilitários */
  .btn-action {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  .btn-file { background: var(--bg-input); border: 1px dashed var(--border); color: var(--text-muted); padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; display: block; font-size: 13px; }
  .btn-delete { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 16px; margin-left: 10px; }
  .file-link { font-size: 11px; color: var(--success); text-decoration: none; display: block; margin-top: 4px; font-weight: bold; }

  /* Setup / Loader Config */
  #setup { position: fixed; top:0; left:0; right:0; bottom:0; background: var(--bg-main); z-index: 10000; display: flex; flex-direction: column; justify-content: center; padding: 30px; }
  .loader { border: 3px solid var(--bg-card); border-top: 3px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; margin: 20px auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

  <div id="setup">
    <h2 style="text-align: center; margin-bottom: 10px;">⚡ Fluxo Setup</h2>
    <p style="color: var(--text-muted); text-align: center; font-size: 13px; margin-bottom: 25px;">Insira a URL de implantação do seu Google Apps Script para começar.</p>
    <div class="form-group">
      <input type="text" id="api-url-input" class="form-control" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <button class="btn-action" onclick="configurarAPI()">Conectar Aplicação</button>
    <div id="setup-loader" style="display: none;" class="loader"></div>
  </div>

  <header>
    <h1>FLUXO<span>.</span></h1>
    <div id="sync-indicator" style="font-size: 11px; color: var(--success); font-weight: bold;">● Online</div>
  </header>

  <div class="container">
    
    <section id="view-dash" class="view-section active">
      <div class="grid-resumo">
        <div class="widget-card receitas">
          <div class="widget-label">Receitas</div>
          <div id="dash-receitas" class="widget-val">R$ 0,00</div>
        </div>
        <div class="widget-card despesas">
          <div class="widget-label">Despesas</div>
          <div id="dash-despesas" class="widget-val">R$ 0,00</div>
        </div>
      </div>
      
      <h3 style="margin-bottom: 15px; font-size: 16px;">Lançamento Rápido</h3>
      <div style="background: var(--bg-card); padding: 15px; border-radius: 10px; border: 1px solid var(--border);">
        <div class="form-group">
          <label>TIPO DE OPERAÇÃO</label>
          <select id="f-tipo" class="form-control">
            <option value="despesa">❌ Despesa (Gasto)</option>
            <option value="receita">💰 Receita (Entrada)</option>
          </select>
        </div>
        <div class="form-group">
          <label>DESCRIÇÃO</label>
          <input type="text" id="f-desc" class="form-control" placeholder="Ex: Aluguel, Internet, Compra Materiais">
        </div>
        <div class="form-group">
          <label>VALOR (R$)</label>
          <input type="number" id="f-valor" class="form-control" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label>CATEGORIA</label>
          <input type="text" id="f-cat" class="form-control" placeholder="Ex: Infraestrutura, Administrativo">
        </div>
        <div class="form-group">
          <label>COMPROVANTE / RECIBO (OPCIONAL)</label>
          <label class="btn-file">
            <span id="file-status">📎 Selecionar Arquivo (PDF/Imagem)</span>
            <input type="file" id="f-file" style="display: none;" onchange="handleFileSelection()">
          </label>
        </div>
        <button class="btn-action" onclick="salvarLancamento()">Registrar na Planilha</button>
      </div>
    </section>

    <section id="view-financeiro" class="view-section">
      <div class="filter-bar">
        <button class="filter-pill active" onclick="filtrarFinancas('todos', this)">Todos</button>
        <button class="filter-pill" onclick="filtrarFinancas('receita', this)">Receitas</button>
        <button class="filter-pill" onclick="filtrarFinancas('despesa', this)">Despesas</button>
      </div>
      <div id="lista-financas"></div>
    </section>

    <section id="view-docs" class="view-section">
      <h3 style="margin-bottom: 15px; font-size: 16px;">Pastas e Contratos</h3>
      <div style="background: var(--bg-card); padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px;">
        <div class="form-group">
          <label>NOME DO DOCUMENTO / CONTRATO</label>
          <input type="text" id="d-nome" class="form-control" placeholder="Ex: Contrato Locacao Bloco A">
        </div>
        <div class="form-group">
          <label>PASTA DE DESTINO</label>
          <select id="d-pasta" class="form-control">
            <option value="Contratos">📄 Contratos Oficiais</option>
            <option value="Recibos">💰 Recibos Emitidos</option>
            <option value="Impostos">🏛️ Impostos e Taxas</option>
          </select>
        </div>
        <div class="form-group">
          <label>ARQUIVO DO DOCUMENTO</label>
          <label class="btn-file">
            <span id="doc-file-status">📁 Selecionar Arquivo</span>
            <input type="file" id="d-file" style="display: none;" onchange="document.getElementById('doc-file-status').innerText = this.files.name">
          </label>
        </div>
        <button class="btn-action" onclick="salvarDocumentoRaiz()">Fazer Upload para o Drive</button>
      </div>
      
      <div class="filter-bar">
        <button class="filter-pill active" onclick="filtrarDocs('Contratos', this)">Contratos</button>
        <button class="filter-pill" onclick="filtrarDocs('Recibos', this)">Recibos</button>
        <button class="filter-pill" onclick="filtrarDocs('Impostos', this)">Impostos</button>
      </div>
      <div id="lista-docs"></div>
    </section>

    <section id="view-config" class="view-section">
      <div style="background: var(--bg-card); padding: 20px; border-radius: 10px; border: 1px solid var(--border);">
        <h4 style="margin-bottom: 10px; color: var(--accent);">⚙️ Configurações do Sistema</h4>
        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px;">Gerencie o Endpoint de conexão do seu banco de dados Google Sheets.</p>
        <div class="form-group">
          <label>URL DA API GOOGLE APPS SCRIPT</label>
          <input type="text" id="config-api-url" class="form-control">
        </div>
        <button class="btn-action" style="background: var(--bg-input); color: white; margin-bottom: 10px;" onclick="atualizarAPIConfig()">Atualizar Endpoint</button>
        <button class="btn-action" style="background: #333;" onclick="limparCacheLocalStorage()">Desconectar e Limpar Dados</button>
      </div>
    </section>

  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="trocarAba('dash', this)">
      <span class="icon">📊</span><span>Painel</span>
    </button>
    <button class="nav-item" onclick="trocarAba('financeiro', this)">
      <span class="icon">💰</span><span>Extrato</span>
    </button>
    <button class="nav-item" onclick="trocarAba('docs', this)">
      <span class="icon">📁</span><span>Arquivos</span>
    </button>
    <button class="nav-item" onclick="trocarAba('config', this)">
      <span class="icon">⚙️</span><span>Ajustes</span>
    </button>
  </nav>

  <template id="temp-financeiro">
    <div class="data-card">
      <div class="card-info">
        <h4 class="title"></h4>
        <p class="meta"></p>
        <a class="file-link" href="#" target="_blank" style="display: none;">📄 Ver Comprovante</a>
      </div>
      <div style="display: flex; align-items: center;">
        <span class="card-badge"></span>
        <button class="btn-delete">🗑️</button>
      </div>
    </div>
  </template>

  <template id="temp-doc">
    <div class="data-card">
      <div class="card-info">
        <h4 class="title"></h4>
        <p class="meta">Pasta: <span class="folder-name"></span></p>
        <a class="file-link" href="#" target="_blank">🔗 Abrir no Drive</a>
      </div>
      <button class="btn-delete">🗑️</button>
    </div>
  </template>

  <script>
    var API = '';
    
    // ESTADO ÚNICO CENTRALIZADO (Single Source of Truth)
    var APP_STATE = {
      gastos: [],
      documentos: [],
      filtroFinancas: 'todos',
      filtroDocs: 'Contratos',
      uploadBase64Buffer: '',
      uploadMimeTypeBuffer: '',
      uploadNomeBuffer: ''
    };

    function init() {
      try {
        API = localStorage.getItem('fluxo_api_url') || '';
        if (API) {
          document.getElementById('setup').style.display = 'none';
          document.getElementById('config-api-url').value = API;
          carregarDadosMaster();
        }
      } catch (e) {
        console.error("Erro na inicialização", e);
      }
    }

    function configurarAPI() {
      var url = document.getElementById('api-url-input').value.trim();
      if (!url) return alert('Insira uma URL válida!');
      
      document.getElementById('setup-loader').style.display = 'block';
      localStorage.setItem('fluxo_api_url', url);
      API = url;
      
      // Valida dando o boot
      carregarDadosMaster(() => {
        document.getElementById('setup').style.display = 'none';
      }, () => {
        alert('Falha na conexão. Verifique o ID da planilha e se a implantação está como acesso "Qualquer pessoa".');
        document.getElementById('setup-loader').style.display = 'none';
      });
    }

    function atualizarAPIConfig() {
      var url = document.getElementById('config-api-url').value.trim();
      if(url) {
        localStorage.setItem('fluxo_api_url', url);
        API = url;
        alert('Endpoint atualizado com sucesso!');
        carregarDadosMaster();
      }
    }

    function limparCacheLocalStorage() {
      if(confirm('Deseja mesmo limpar as chaves locais e desconectar do Apps Script?')) {
        localStorage.clear();
        window.location.reload();
      }
    }

    // Carregamento de dados unificado (Apenas 1 chamada de rede limpa)
    function carregarDadosMaster(cbSuccess, cbError) {
      document.getElementById('sync-indicator').innerText = '🔄 Atualizando...';
      document.getElementById('sync-indicator').style.color = 'var(--text-muted)';

      fetch(API + '?action=boot')
        .then(res => res.json())
        .then(res => {
          if (res.success) {
            APP_STATE.gastos = res.gastos || [];
            APP_STATE.documentos = res.documentos || [];
            
            renderizarPainelResumo();
            renderizarFinancas();
            renderizarDocumentos();
            
            document.getElementById('sync-indicator').innerText = '● Atualizado';
            document.getElementById('sync-indicator').style.color = 'var(--success)';
            if(cbSuccess) cbSuccess();
          } else {
            if(cbError) cbError();
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('sync-indicator').innerText = '● Modo Offline';
          document.getElementById('sync-indicator').style.color = 'var(--accent)';
          if(cbError) cbError();
        });
    }

    // Alternador de Abas do Menu Inferior
    function trocarAba(abaId, elementoNav) {
      document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
      
      document.getElementById('view-' + abaId).classList.add('active');
      elementoNav.classList.add('active');
    }

    // Processamento de Arquivos do Lançamento Rápido
    function handleFileSelection() {
      const fileInput = document.getElementById('f-file');
      const file = fileInput.files;
      if (!file) return;
      
      document.getElementById('file-status').innerText = "⏳ Convertendo: " + file.name;
      const reader = new FileReader();
      reader.onload = function(e) {
        APP_STATE.uploadBase64Buffer = e.target.result.split(',');
        APP_STATE.uploadMimeTypeBuffer = file.type;
        APP_STATE.uploadNomeBuffer = file.name;
        document.getElementById('file-status').innerText = "✅ " + file.name + " pronto";
      };
      reader.readAsDataURL(file);
    }

    // Salvar Transação com ou sem Mídia anexada
    function salvarLancamento() {
      var tipo = document.getElementById('f-tipo').value;
      var desc = document.getElementById('f-desc').value.trim();
      var valor = document.getElementById('f-valor').value;
      var cat = document.getElementById('f-cat').value.trim();

      if (!desc || !valor) return alert('Por favor preencha Descrição e Valor.');

      var payloadGasto = {
        id: '',
        data: new Date().toISOString().split('T'),
        categoria: cat,
        descricao: desc,
        valor: parseFloat(valor),
        tipo: tipo,
        fileUrl: ''
      };

      // Se houver arquivo no buffer, faz upload pro Drive primeiro
      if (APP_STATE.uploadBase64Buffer) {
        document.getElementById('sync-indicator').innerText = '📤 Subindo mídia pro Drive...';
        var uploadPayload = {
          bytes: APP_STATE.uploadBase64Buffer,
          mimeType: APP_STATE.uploadMimeTypeBuffer,
          nome: APP_STATE.uploadNomeBuffer
        };

        fetch(API + '?action=uploadArquivo&payload=' + encodeURIComponent(JSON.stringify(uploadPayload)))
          .then(r => r.json())
          .then(res => {
            if(res.success) {
              payloadGasto.fileUrl = res.url;
              enviarDadosGastoPlanilha(payloadGasto);
            } else {
              alert('Falha no upload do arquivo, registrando sem mídia.');
              enviarDadosGastoPlanilha(payloadGasto);
            }
          }).catch(() => {
            enviarDadosGastoPlanilha(payloadGasto);
          });
      } else {
        enviarDadosGastoPlanilha(payloadGasto);
      }
    }

    function enviarDadosGastoPlanilha(payload) {
      fetch(API + '?action=salvarGasto&payload=' + encodeURIComponent(JSON.stringify(payload)))
        .then(r => r.json())
        .then(res => {
          if(res.success) {
            // Limpeza de formulário e buffers
            document.getElementById('f-desc').value = '';
            document.getElementById('f-valor').value = '';
            document.getElementById('f-cat').value = '';
            document.getElementById('file-status').innerText = "📎 Selecionar Arquivo (PDF/Imagem)";
            APP_STATE.uploadBase64Buffer = '';
            
            carregarDadosMaster();
            alert('Lançamento inserido e sincronizado com o Sheets!');
          }
        });
    }

    // Upload direto pela aba de Arquivos / Contratos
    function salvarDocumentoRaiz() {
      var nome = document.getElementById('d-nome').value.trim();
      var pasta = document.getElementById('d-pasta').value;
      var fileInput = document.getElementById('d-file');
      var file = fileInput.files;

      if (!nome || !file) return alert('Insira um nome e selecione um arquivo.');

      var reader = new FileReader();
      reader.onload = function(e) {
        var bytes = e.target.result.split(',');
        var uploadPayload = { bytes: bytes, mimeType: file.type, nome: file.name };
        
        document.getElementById('sync-indicator').innerText = '📤 Enviando Documento...';
        
        fetch(API + '?action=uploadArquivo&payload=' + encodeURIComponent(JSON.stringify(uploadPayload)))
          .then(r => r.json())
          .then(res => {
            if (res.success) {
              var docMeta = { pasta: pasta, nome: nome, url: res.url };
              fetch(API + '?action=salvarDoc&payload=' + encodeURIComponent(JSON.stringify(docMeta)))
                .then(r => r.json())
                .then(metaRes => {
                  if(metaRes.success) {
                    document.getElementById('d-nome').value = '';
                    document.getElementById('doc-file-status').innerText = "📁 Selecionar Arquivo";
                    carregarDadosMaster();
                    alert('Documento guardado com sucesso no Google Drive!');
                  }
                });
            }
          });
      };
      reader.readAsDataURL(file);
    }

    function deletarGasto(id) {
      if(confirm('Excluir definitivamente este registro da planilha?')) {
        fetch(API + '?action=deletarGasto&payload=' + encodeURIComponent(JSON.stringify({id: id})))
          .then(r => r.json())
          .then(res => { if(res.success) carregarDadosMaster(); });
      }
    }

    function deletarDoc(id) {
      if(confirm('Remover registro do documento?')) {
        fetch(API + '?action=deletarDoc&payload=' + encodeURIComponent(JSON.stringify({id: id})))
          .then(r => r.json())
          .then(res => { if(res.success) carregarDadosMaster(); });
      }
    }

    // Filtros Rápidos Sem Mudar de Tela
    function filtrarFinancas(tipo, btn) {
      APP_STATE.filtroFinancas = tipo;
      document.querySelectorAll('#view-financeiro .filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderizarFinancas();
    }

    function filtrarDocs(pasta, btn) {
      APP_STATE.filtroDocs = pasta;
      document.querySelectorAll('#view-docs .filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderizarDocumentos();
    }

    // ════════════════════════════════════════
    //  MOTORES DE RENDERIZAÇÃO (INTERFACE LIMPA)
    // ════════════════════════════════════════
    function renderizarPainelResumo() {
      var rec = 0; var des = 0;
      APP_STATE.gastos.forEach(g => {
        if(g.tipo === 'receita') rec += g.valor;
        else des += g.valor;
      });
      document.getElementById('dash-receitas').innerText = rec.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      document.getElementById('dash-despesas').innerText = des.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function renderizarFinancas() {
      var container = document.getElementById('lista-financas');
      container.innerHTML = '';
      var template = document.getElementById('temp-financeiro');

      var filtrados = APP_STATE.gastos.filter(g => APP_STATE.filtroFinancas === 'todos' || g.tipo === APP_STATE.filtroFinancas);

      if(filtrados.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-size:13px; padding:20px;">Nenhum lançamento nesta categoria.</p>';
        return;
      }

      filtrados.forEach(g => {
        var clone = template.content.cloneNode(true);
        clone.querySelector('.title').textContent = g.descricao;
        clone.querySelector('.meta').textContent = g.data + ' · ' + g.categoria;
        
        var badge = clone.querySelector('.card-badge');
        badge.textContent = g.valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        badge.classList.add(g.tipo === 'receita' ? 'rec' : 'des');

        if (g.fileUrl) {
          var link = clone.querySelector('.file-link');
          link.href = g.fileUrl;
          link.style.display = 'block';
        }

        clone.querySelector('.btn-delete').onclick = function() { deletarGasto(g.id); };
        container.appendChild(clone);
      });
    }

    function renderizarDocumentos() {
      var container = document.getElementById('lista-docs');
      container.innerHTML = '';
      var template = document.getElementById('temp-doc');

      var filtrados = APP_STATE.documentos.filter(d => d.pasta === APP_STATE.filtroDocs);

      if(filtrados.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-size:13px; padding:20px;">Nenhum documento nesta pasta.</p>';
        return;
      }

      filtrados.forEach(d => {
        var clone = template.content.cloneNode(true);
        clone.querySelector('.title').textContent = d.nome;
        clone.querySelector('.folder-name').textContent = d.pasta;
        clone.querySelector('.file-link').href = d.url;
        clone.querySelector('.btn-delete').onclick = function() { deletarDoc(d.id); };
        container.appendChild(clone);
      });
    }

    // Inicializa a escuta de eventos ao carregar a janela
    window.onload = init;
  </script>
</body>
</html>
