<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo -->
  <rect width="512" height="512" rx="100" fill="#0F1923"/>
  <!-- Círculo externo com setas -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#2ECC9A" stroke-width="28" stroke-dasharray="530 110" stroke-dashoffset="0" stroke-linecap="round"/>
  <!-- Seta superior direita -->
  <polyline points="420,165 445,145 430,115" fill="none" stroke="#2ECC9A" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Seta inferior esquerda -->
  <polyline points="92,347 67,367 82,397" fill="none" stroke="#2ECC9A" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Círculo interno preenchido -->
  <circle cx="256" cy="256" r="120" fill="#2ECC9A"/>
  <!-- Símbolo $ -->
  <text x="256" y="300" font-family="Arial,Helvetica,sans-serif" font-size="160" font-weight="900" fill="#0F1923" text-anchor="middle">$</text>
</svg>